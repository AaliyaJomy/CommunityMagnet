<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business Details | Community Magnet</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="detail-body">

    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <i class="fas fa-magnet" style="color: #FF5A1F; transform: rotate(-45deg); margin-right: 5px;"></i>
                Community<span style="font-weight: 300; color: #6D3D3D;">Magnet</span>
            </div>
            <ul class="nav-links">
                <li><a href="index.html" class="active">Discover</a></li>
                <li><a href="#">Categories</a></li>
                <li><a href="#">Deals</a></li>
                <li><a href="#">Submit a Spot</a></li>
                <li><a href="#" class="login-btn">Log in</a></li>
            </ul>
        </div>
    </nav>

    <header class="detail-hero" id="hero-bg">
        <div class="view-route-badge"><i class="fas fa-directions"></i> View Route</div>
    </header>

    <main class="detail-container">
        <section class="info-card">
            <div class="info-header">
                <div>
                    <h1 id="biz-name">Loading...</h1>
                    <p id="biz-cat" class="category-label">Category</p>
                </div>
                <span class="status-badge" id="biz-status">Open</span>
            </div>

            <div class="meta-grid">
                <div class="meta-item"><i class="fas fa-map-marker-alt"></i> <span id="biz-loc">Location</span></div>
                <div class="meta-item"><i class="fas fa-clock"></i> <span>10:00 AM - 9:00 PM</span></div>
                <div class="meta-item"><i class="fas fa-star"></i> <span id="biz-rating">4.8</span> (120 Reviews)</div>
                <div class="meta-item"><i class="fas fa-check-circle"></i> <span>Verified Business</span></div>
            </div>

            <div id="dynamic-info-section">
                </div>

            <div class="gallery-section">
                <h3>Gallery</h3>
                <div class="gallery-grid" id="gallery-images">
                    </div>
            </div>
        </section>
    </main>

    <script src="detail.js"></script>
</body>
</html>
